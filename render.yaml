services:
  - type: web
    name: drs-v3-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: CF_ACCOUNT_ID
        sync: false
      - key: CF_DATABASE_ID
        sync: false
      - key: CF_API_TOKEN
        sync: false
      - key: MOCK_OCR
        value: "true"
      - key: MANGA_OCR_API_URL
        sync: false
      - key: PADDLE_OCR_API_URL
        sync: false
